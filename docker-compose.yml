version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ghost_postgresql
    environment:
      POSTGRES_USER: ghost_user
      POSTGRES_PASSWORD: Vold@1482
      POSTGRES_DB: ghost_protocol
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghost_user -d ghost_protocol"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    # Redis will act as the storage and message broker for BullMQ
    image: redis:7-alpine
    container_name: ghost_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Enabling appendonly allows persistence for queue messages if container restarts
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
