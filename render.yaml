services:
  # The Node.js Backend API
  - type: web
    name: ghost-protocol-backend
    env: node
    plan: free
    rootDir: ghost-protocol-backend
    buildCommand: npm install --include=dev && npm run db:generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ghost-protocol-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: ghost-protocol-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: ghost-protocol-redis
          property: port
      # Secrets to be provided manually in the Render Dashboard
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_ORG
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false

  # The Redis instance for caching and BullMQ
  - type: redis
    name: ghost-protocol-redis
    plan: free
    ipAllowList: []

databases:
  # The PostgreSQL database
  - name: ghost-protocol-db
    databaseName: ghost_protocol
    user: ghost_user
    plan: free
